models:
  slm:
    name: Qwen3-1.7B
    path: /ABSOLUTE/PATH/TO/Qwen3-1.7B
    # transformers = current local MDRV runner.
    # vllm_worker = reserved external worker route.
    backend: transformers
    # transformers: local MDRV boundary replay.
    # none: generation only.
    probe_mode: transformers
    worker_endpoint: null
    device: cuda:0
    dtype: bfloat16
    trust_remote_code: false
  llm:
    name: Qwen3-4B
    path: /ABSOLUTE/PATH/TO/Qwen3-4B
    backend: transformers
    probe_mode: none
    worker_endpoint: null
    device: cuda:1
    dtype: bfloat16
    trust_remote_code: false

data:
  # Generic local JSONL: one object per line with id/question/answer fields.
  # Set dataset to aime24, aime25, gpqa, or gpqa_diamond to enable benchmark
  # prompt/gold adapters. Leave null for generic rows.
  path: /ABSOLUTE/PATH/TO/data/math_eval.jsonl
  format: auto
  dataset: null
  split: null
  id_field: id
  question_field: question
  answer_field: answer
  start: 0
  limit: null

prompt:
  system_prompt: You are a careful reasoning assistant.
  enable_thinking: true
  thinking_end_marker: "</think>"
  sink_prefix_tokens: 1
  takeover_cue: "\n\nYou are continuing a reasoning process. The previous small model reasoning is trusted only up to the last provided step. Continue from that point and solve the problem. Do not assume any later discarded reasoning is correct. Put the final answer in \\boxed{}.\n\n"

generation:
  do_sample: true
  temperature: 0.6
  top_p: 0.95
  top_k: 20
  presence_penalty: 0.0
  repetition_penalty: 1.0
  seed: 1234
  max_initial_slm_tokens: 8192
  max_llm_finish_tokens: 8192
  max_final_answer_tokens: 2048

signals:
  attention_head_chunk_size: 4
  route_epsilon: 1.0e-12
  profile_route_with_cuda_sync: false

controller:
  # MDRV takeover budget threshold tau.
  alarm_threshold: null

protocol:
  run_mode: offline_replay
  route_discount: true
  takeover_mode: rollback
  attention_route_mode: last_layer_single_row

cost:
  synchronize_cuda_for_timing: true
  record_cuda_memory: true
  record_attention_work_proxy: true

evaluation:
  verifier: auto

output:
  directory: /ABSOLUTE/PATH/TO/outputs/qwen3_1p7b_4b_core
  overwrite: false
  save_full_text: true
